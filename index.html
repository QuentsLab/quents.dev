<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quents — Full Linux environments, one command away</title>
<meta name="description" content="Quents lets you pull, run, and manage full Linux environments — from Ubuntu to Kali — with one command. Self-hosted, under your control." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1116;
    --surface: #161B22;
    --border: #2A323D;
    --text: #E6E8EB;
    --text-muted: #8B949E;
    --accent: #E8954A;
    --accent-dim: #B97A3D;
    --live: #4ADE80;
    --error: #F87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body {
    display:flex; align-items:center; justify-content:center;
    padding: 8vh 24px; line-height:1.55;
  }
  .wrap { max-width: 680px; width:100%; }

  .brand {
    font-family: var(--mono); font-weight:600; font-size:13px;
    letter-spacing: 0.12em; color: var(--text-muted); text-transform:uppercase;
    margin-bottom: 56px; display:flex; align-items:center; gap:9px;
  }
  .brand .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }

  .terminal {
    font-family: var(--mono); font-size: clamp(20px, 4.6vw, 36px); font-weight:600;
    color: var(--text); margin-bottom: 30px; min-height: 1.3em;
    word-break: break-word;
  }
  .terminal .prompt { color: var(--accent); }
  .terminal .cursor {
    display:inline-block; width:0.5ch; height:1em; background:var(--accent);
    margin-left:3px; vertical-align:-0.15em; animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  h1.tagline {
    font-family: var(--sans); font-weight:600; font-size: clamp(19px, 2.6vw, 25px);
    margin-bottom:14px; letter-spacing: -0.01em;
  }
  p.sub { color: var(--text-muted); font-size:16px; max-width:480px; margin-bottom:42px; }

  .stats {
    display:flex; gap:12px; flex-wrap:wrap; margin-bottom:42px;
    font-family:var(--mono); font-size:13px;
  }
  .stat {
    border:1px solid var(--border); background:var(--surface); padding:10px 16px;
    border-radius:6px; display:flex; align-items:center; gap:9px; color: var(--text-muted);
  }
  .stat b { color: var(--text); font-weight:600; }
  .stat .pulse {
    width:7px; height:7px; border-radius:50%; background: var(--live); flex-shrink:0;
    box-shadow: 0 0 0 0 rgba(74,222,128,0.6); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  form.signup {
    display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden;
    background: var(--surface); max-width:460px; font-family:var(--mono);
  }
  form.signup .lead { padding:14px 0 14px 16px; color:var(--accent); user-select:none; }
  form.signup input {
    flex:1; min-width:0; background:transparent; border:none; color:var(--text);
    font-family:var(--mono); font-size:15px; padding:14px 8px; outline:none;
  }
  form.signup input::placeholder { color: var(--text-muted); }
  form.signup input:focus-visible { outline: 2px solid var(--accent); outline-offset:-2px; }
  form.signup button {
    border:none; background:var(--accent); color:#1a1208; font-family:var(--mono);
    font-weight:600; padding:0 18px; cursor:pointer; font-size:14px;
    transition: background 0.15s; white-space:nowrap;
  }
  form.signup button:hover { background: var(--accent-dim); }
  form.signup button:focus-visible { outline:2px solid var(--text); outline-offset:2px; }

  .msg { margin-top:14px; font-size:14px; font-family:var(--mono); color: var(--live); min-height:1.2em; }
  .msg.error { color:var(--error); }

  footer { margin-top:72px; color: var(--text-muted); font-size:13px; font-family:var(--mono); }
  footer a { color: var(--text-muted); text-decoration:none; border-bottom:1px solid var(--border); }
  footer a:hover { color:var(--accent); border-color:var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .terminal .cursor, .stat .pulse { animation:none; }
  }
  @media (max-width:420px) {
    form.signup { flex-direction:column; }
    form.signup .lead { display:none; }
    form.signup button { padding:12px 0; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="dot"></span>Quents</div>

    <div class="terminal"><span class="prompt">$</span> <span id="typed"></span><span class="cursor"></span></div>

    <h1 class="tagline">Full Linux environments, one command away.</h1>
    <p class="sub">Pull, run, and manage real Linux distros — Ubuntu, Debian, Kali, and more — self-hosted on your own hardware. No cloud lock-in, no shared infrastructure.</p>

    <div class="stats">
      <div class="stat">TOTAL_VISITORS: <b id="totalVisitors">—</b></div>
      <div class="stat"><span class="pulse"></span>ONLINE_NOW: <b id="onlineNow">—</b></div>
    </div>

    <form class="signup" id="signupForm" novalidate>
      <span class="lead">$</span>
      <input type="email" id="emailInput" placeholder="you@domain.com" required autocomplete="email" aria-label="Email address" />
      <button type="submit">Notify me</button>
    </form>
    <div class="msg" id="formMsg" role="status" aria-live="polite"></div>

    <footer>© 2026 QuentsLab · quents.dev</footer>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics.js";
  import {
    getDatabase, ref, onValue, onDisconnect, set, runTransaction, push, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

  /* ==================================================================
     Quents — Firebase project config (quents-92e74)
  ================================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyBaQftlA_XBKId64HzzmK1XPr-qVpDLekg",
    authDomain: "quents-92e74.firebaseapp.com",
    databaseURL: "https://quents-92e74-default-rtdb.firebaseio.com",
    projectId: "quents-92e74",
    storageBucket: "quents-92e74.firebasestorage.app",
    messagingSenderId: "226670986894",
    appId: "1:226670986894:web:fcf9e87061fddd9612ebdf",
    measurementId: "G-DE75P14020"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);

  /* ---------- Total visitor counter (increments once per page load) ---------- */
  const totalRef = ref(db, "stats/totalVisitors");
  runTransaction(totalRef, (current) => (current || 0) + 1);
  onValue(totalRef, (snap) => {
    document.getElementById("totalVisitors").textContent = (snap.val() || 0).toLocaleString();
  });

  /* ---------- Live "online now" presence ---------- */
  const presenceListRef = ref(db, "presence");
  const myPresenceRef = push(presenceListRef);
  onValue(ref(db, ".info/connected"), (snap) => {
    if (snap.val() === true) {
      onDisconnect(myPresenceRef).remove();
      set(myPresenceRef, true);
    }
  });
  onValue(presenceListRef, (snap) => {
    const val = snap.val();
    document.getElementById("onlineNow").textContent = val ? Object.keys(val).length : 0;
  });

  /* ---------- Typewriter hero ---------- */
  const commands = ["quents pull kali", "quents run pentest-lab", "quents gui pentest-lab"];
  const typedEl = document.getElementById("typed");
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  async function typeLoop() {
    if (reduceMotion) { typedEl.textContent = commands[0]; return; }
    let i = 0;
    while (true) {
      const cmd = commands[i % commands.length];
      for (let c = 1; c <= cmd.length; c++) { typedEl.textContent = cmd.slice(0, c); await sleep(35); }
      await sleep(1600);
      for (let c = cmd.length; c >= 0; c--) { typedEl.textContent = cmd.slice(0, c); await sleep(20); }
      await sleep(300);
      i++;
    }
  }
  typeLoop();

  /* ---------- Email signup ---------- */
  const form = document.getElementById("signupForm");
  const msg = document.getElementById("formMsg");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const emailInput = document.getElementById("emailInput");
    const email = emailInput.value.trim();
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      msg.classList.add("error");
      msg.textContent = "Enter a valid email address.";
      return;
    }
    try {
      await push(ref(db, "waitlist"), { email, timestamp: serverTimestamp() });
      msg.classList.remove("error");
      msg.textContent = "You're on the list.";
      emailInput.value = "";
    } catch (err) {
      msg.classList.add("error");
      msg.textContent = "Something went wrong. Try again.";
    }
  });
</script>
</body>
</html>
